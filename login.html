<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Chato Comunicaciones</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f3f4f6;
    }

    .login-container {
      max-width: 900px;
    }

    .left-side {
      background: linear-gradient(135deg, #ff6a00, #ff7a1a);
      color: white;
    }

    .login-card {
      border-radius: 20px;
      overflow: hidden;
    }

    .form-control:focus {
      border-color: #ff6a00;
      box-shadow: 0 0 0 0.2rem rgba(255,106,0,0.25);
    }

    .btn-primary-custom {
      background: linear-gradient(90deg, #ff6a00, #ff7a1a);
      border: none;
    }

    .btn-primary-custom:hover {
      opacity: 0.9;
    }
  </style>

</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container login-container">
  <div class="card shadow-lg login-card">

    <div class="row g-0">

      <!-- LADO IZQUIERDO -->
      <div class="col-md-6 d-none d-md-flex flex-column justify-content-center align-items-center left-side p-4">

        <img src="logo.png" alt="Logo" class="mb-4" style="width: 120px;">

        <h4 class="fw-bold">Chato Comunicaciones</h4>
        <p class="text-center small">
          Venta y reparación de smartphones con calidad garantizada.
        </p>

      </div>

   
      <div class="col-md-6 p-5">

        <h4 class="fw-bold text-center mb-4">Iniciar Sesión</h4>

        <form action="login.php" method="POST">

   


          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" name="email" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control">
          </div>

   
          <button type="submit" class="btn btn-primary-custom w-100 mb-3">
            Entrar
          </button>


          <div class="d-flex justify-content-between small">
            <a href="#" class="text-decoration-none text-secondary">¿Olvidaste tu contraseña?</a>
            <a href="registro.html" class="text-decoration-none text-secondary">Registrarse</a>
          </div>

        </form>

      </div>

    </div>

  </div>
</div>

</body>
</html>
